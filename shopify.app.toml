# Shopify App Configuration
# This file declares the app's configuration including scopes, URLs, and webhooks.
# Push to Partner Dashboard with: npx shopify app config push

name = "POD Design Generator"
client_id = "fed58333bb62adb69343c109cd77d5ef"
application_url = "https://shopify-pod-app-production.up.railway.app"
embedded = true

[access_scopes]
scopes = "read_products,write_products"

[auth]
redirect_urls = [
  "https://shopify-pod-app-production.up.railway.app/auth/callback"
]

[webhooks]
api_version = "2025-10"

  [webhooks.privacy_compliance]
  customer_data_request_url = "https://shopify-pod-app-production.up.railway.app/webhooks/customers/data_request"
  customer_deletion_url = "https://shopify-pod-app-production.up.railway.app/webhooks/customers/redact"
  shop_deletion_url = "https://shopify-pod-app-production.up.railway.app/webhooks/shop/redact"

[pos]
embedded = false
